name: Publish Docker Images

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Docker tag to publish (e.g. latest, 1.2.3)"
        required: false
        default: "latest"

env:
  REGISTRY: docker.io
  ORG: sovereigndigital

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - image: forge
            dockerfile: Dockerfile
            context: .
          - image: hawk
            dockerfile: apps/hawk/Dockerfile
            context: apps/hawk
          - image: quill
            dockerfile: apps/quill/Dockerfile
            context: apps/quill
          - image: creed
            dockerfile: apps/creed/Dockerfile
            context: apps/creed
          - image: sage
            dockerfile: apps/sage/Dockerfile
            context: apps/sage
          - image: flint
            dockerfile: apps/flint/Dockerfile
            context: apps/flint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for multi-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Derive tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="${{ github.event.inputs.tag || 'latest' }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${{ env.ORG }}/${{ matrix.image }}:latest" >> "$GITHUB_OUTPUT"
          echo "versioned_tag=${{ env.ORG }}/${{ matrix.image }}:$TAG" >> "$GITHUB_OUTPUT"

      - name: Check Dockerfile exists
        id: check_df
        run: |
          if [ -f "${{ matrix.dockerfile }}" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Skipping ${{ matrix.image }} — ${{ matrix.dockerfile }} not found"
          fi

      - name: Build and push ${{ matrix.image }}
        if: steps.check_df.outputs.exists == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.meta.outputs.latest_tag }}
            ${{ steps.meta.outputs.versioned_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.repository.updated_at }}
            GIT_SHA=${{ github.sha }}
