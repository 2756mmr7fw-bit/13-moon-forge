name: Publish Docker Images

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Docker tag to publish (e.g. latest, 1.2.3)"
        required: false
        default: "latest"

env:
  REGISTRY: docker.io
  ORG: 13moonstpts

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Derive tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="${{ github.event.inputs.tag || 'latest' }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${{ env.ORG }}/forge:latest" >> "$GITHUB_OUTPUT"
          echo "versioned_tag=${{ env.ORG }}/forge:$TAG" >> "$GITHUB_OUTPUT"

      - name: Build and push forge
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          no-cache: true
          tags: |
            ${{ steps.meta.outputs.latest_tag }}
            ${{ steps.meta.outputs.versioned_tag }}
          build-args: |
            BUILD_DATE=${{ github.event.repository.updated_at }}
            GIT_SHA=${{ github.sha }}
            CACHEBUST=${{ github.run_id }}
            BUILD_ID=${{ github.ref_name }}-${{ github.run_id }}
            VITE_CLERK_PUBLISHABLE_KEY=${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}

      - name: Redeploy on Coolify (patch compose + force pull)
        if: success()
        env:
          COOLIFY_API_KEY: ${{ secrets.FORGE_COOLIFY_API_KEY }}
          COOLIFY_URL: http://5.78.154.21:8000
          SERVICE_UUID: m7c7lrtb9seh441x60lwgd8y
          IMAGE_TAG: ${{ steps.meta.outputs.versioned_tag }}
          DEPLOY_BUST: ${{ github.ref_name }}-${{ github.run_id }}
        run: |
          set -e
          echo "Patching Coolify service compose with new image + pull_policy: always..."
          python3 - <<'EOF'
          import subprocess, base64, os, json

          image_tag = os.environ["IMAGE_TAG"]
          deploy_bust = os.environ["DEPLOY_BUST"]
          coolify_url = os.environ["COOLIFY_URL"]
          api_key = os.environ["COOLIFY_API_KEY"]
          service_uuid = os.environ["SERVICE_UUID"]

          compose = f"""services:
            forge:
              image: '{image_tag}'
              pull_policy: always
              restart: unless-stopped
              expose:
                - '8080'
              environment:
                NODE_ENV: production
                PORT: '8080'
                APP_URL: '${{APP_URL}}'
                DATABASE_URL: '${{DATABASE_URL}}'
                SESSION_SECRET: '${{SESSION_SECRET}}'
                MOON_API_KEY: '${{MOON_API_KEY}}'
                TPTS_MOON_API_KEY: '${{TPTS_MOON_API_KEY}}'
                TSQ_MOON_API_KEY: '${{TSQ_MOON_API_KEY}}'
                TPTS_INBOUND_KEY: '${{TPTS_INBOUND_KEY}}'
                CLERK_SECRET_KEY: '${{CLERK_SECRET_KEY}}'
                VITE_CLERK_PUBLISHABLE_KEY: '${{VITE_CLERK_PUBLISHABLE_KEY}}'
                RESEND_API_KEY: '${{RESEND_API_KEY}}'
                ELEVENLABS_API_KEY: '${{ELEVENLABS_API_KEY}}'
                SQUARE_API_KEY: '${{SQUARE_API_KEY}}'
                OIDC_CLIENT_ID: '${{OIDC_CLIENT_ID}}'
                FORGEJO_URL: '${{FORGEJO_URL}}'
                FORGEJO_TOKEN: '${{FORGEJO_TOKEN}}'
                FORGE_COOLIFY_URL: '${{FORGE_COOLIFY_URL}}'
                FORGE_COOLIFY_API_KEY: '${{FORGE_COOLIFY_API_KEY}}'
                FORGE_COOLIFY_PROJECT_UUID: '${{FORGE_COOLIFY_PROJECT_UUID}}'
                FORGE_COOLIFY_SERVER_UUID: '${{FORGE_COOLIFY_SERVER_UUID}}'
                DEPLOY_BUST: '{deploy_bust}'
          """

          compose_b64 = base64.b64encode(compose.encode()).decode()
          payload = json.dumps({"docker_compose_raw": compose_b64})

          result = subprocess.run([
            "curl", "-s", "-X", "PATCH",
            f"{coolify_url}/api/v1/services/{service_uuid}",
            "-H", f"Authorization: Bearer {api_key}",
            "-H", "Content-Type: application/json",
            "-d", payload
          ], capture_output=True, text=True)
          print("PATCH result:", result.stdout[:200])

          result2 = subprocess.run([
            "curl", "-s",
            f"{coolify_url}/api/v1/deploy?uuid={service_uuid}&force=true",
            "-H", f"Authorization: Bearer {api_key}"
          ], capture_output=True, text=True)
          print("Deploy result:", result2.stdout[:200])
          EOF
          echo "Deploy triggered."
