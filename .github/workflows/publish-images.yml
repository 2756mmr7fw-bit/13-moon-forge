name: Publish Docker Images

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Docker tag to publish (e.g. latest, 1.2.3)"
        required: false
        default: "latest"

env:
  REGISTRY: docker.io
  ORG: 13moonstpts

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Derive tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="${{ github.event.inputs.tag || 'latest' }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${{ env.ORG }}/forge:latest" >> "$GITHUB_OUTPUT"
          echo "versioned_tag=${{ env.ORG }}/forge:$TAG" >> "$GITHUB_OUTPUT"

      - name: Build and push forge
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          no-cache: true
          tags: |
            ${{ steps.meta.outputs.latest_tag }}
            ${{ steps.meta.outputs.versioned_tag }}
          build-args: |
            BUILD_DATE=${{ github.event.repository.updated_at }}
            GIT_SHA=${{ github.sha }}
            CACHEBUST=${{ github.run_id }}
            VITE_CLERK_PUBLISHABLE_KEY=${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}

      - name: Redeploy on Coolify (stop then start to force image pull)
        if: success()
        env:
          COOLIFY_API_KEY: ${{ secrets.FORGE_COOLIFY_API_KEY }}
          COOLIFY_URL: http://5.78.154.21:8000
          SERVICE_UUID: m7c7lrtb9seh441x60lwgd8y
        run: |
          echo "Stopping service..."
          curl -s -X POST "$COOLIFY_URL/api/v1/services/$SERVICE_UUID/stop"             -H "Authorization: Bearer $COOLIFY_API_KEY" -H "Content-Type: application/json"
          echo "Waiting 20s for container to stop..."
          sleep 20
          echo "Starting service (will pull latest image)..."
          curl -s "$COOLIFY_URL/api/v1/deploy?uuid=$SERVICE_UUID&force=true"             -H "Authorization: Bearer $COOLIFY_API_KEY"
          echo "Deploy triggered."
