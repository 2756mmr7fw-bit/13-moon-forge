kind = "web"
previewPath = "/"
title = "The Forge"
version = "1.0.0"
id = "artifacts/the-forge"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25654

[services.development]
run = "pnpm --filter @workspace/the-forge run dev"

[services.production.build]
args = ["pnpm", "--filter", "@workspace/the-forge", "run", "build"]

[services.production.build.env]
VITE_CLERK_PROXY_URL = "https://13moonforge.ai/api/__clerk"

[services.production.run]
args = ["pnpm", "--filter", "@workspace/the-forge", "run", "serve"]

[services.production.health.startup]
path = "/"

[services.env]
PORT = "25654"
BASE_PATH = "/"
