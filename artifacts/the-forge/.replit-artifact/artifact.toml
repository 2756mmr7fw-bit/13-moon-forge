kind = "web"
previewPath = "/"
title = "The Forge"
version = "1.0.0"
id = "artifacts/the-forge"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25654

[services.development]
run = "pnpm --filter @workspace/the-forge run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/the-forge", "run", "build" ]

[services.production.run]
args = ["node", "artifacts/the-forge/server.mjs"]

[services.production.health.startup]
path = "/"

[services.env]
PORT = "25654"
BASE_PATH = "/"
