kind = "web"
previewPath = "/film-editor/"
title = "13 Moon Film Editor"
version = "1.0.0"
id = "artifacts/film-editor"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/film-editor/" ]
localPort = 22132

[services.development]
run = "pnpm --filter @workspace/film-editor run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/film-editor", "run", "build" ]
publicDir = "artifacts/film-editor/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22132"
BASE_PATH = "/film-editor/"
