kind = "api"
  previewPath = "/api" # TODO - should be excluded from preview in the first place
  title = "API Server"
  version = "1.0.0"
  id = "3B4_FFSkEVBkAeYMFRJ2e"

  [[services]]
  localPort = 8080
  name = "API Server"
  paths = ["/"]

  [services.development]
  run = "pnpm --filter @workspace/api-server run dev"

  [services.production]

  [services.production.run]
  # Build the-forge SPA, copy its dist into ./public/, build and start api-server.
  # The api-server (kind=api) responses are NOT CDN-cached by Replit, so users
  # always get the freshly built index.html — this fixes the stale CDN black-screen.
  args = ["pnpm", "--filter", "@workspace/api-server", "run", "prod"]

  [services.production.run.env]
  PORT = "8080"
  NODE_ENV = "production"

  [services.production.health.startup]
  path = "/api/healthz"
