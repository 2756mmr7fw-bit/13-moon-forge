services:
  forge:
    image: ${FORGE_IMAGE:-13moonstpts/forge:latest}
    restart: unless-stopped
    expose:
      - "8080"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 8080
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.forge.rule=Host(`13moonforge.ai`) || Host(`www.13moonforge.ai`) || Host(`13moonsfilmeditor.ai`) || Host(`www.13moonsfilmeditor.ai`)"
      - "traefik.http.routers.forge.entrypoints=http,https"
      - "traefik.http.routers.forge.tls=true"
      - "traefik.http.routers.forge.tls.certresolver=letsencrypt"
      - "traefik.http.services.forge.loadbalancer.server.port=8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - coolify

networks:
  coolify:
    external: true
