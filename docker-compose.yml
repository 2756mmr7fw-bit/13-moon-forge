services:
  forge:
    image: ${FORGE_IMAGE:-13moonstpts/forge:latest}
    restart: unless-stopped
    expose:
      - "8080"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 8080
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.forge.rule=Host(`13moonforge.ai`) || Host(`www.13moonforge.ai`)"
      - "traefik.http.routers.forge.entrypoints=http,https"
      - "traefik.http.routers.forge.tls=true"
      - "traefik.http.routers.forge.tls.certresolver=letsencrypt"
      - "traefik.http.services.forge.loadbalancer.server.port=8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      db:
        condition: service_healthy
    networks:
      - coolify
      - default

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: forge
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

volumes:
  postgres_data:

networks:
  coolify:
    external: true
  default:
