openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: The Forge - Website Builder API
servers:
  - url: /api
    description: Base API path
tags:
  - name: showcase
    description: App showcase
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: projects
    description: Website projects
  - name: pages
    description: Pages within a project
  - name: dashboard
    description: Dashboard summary endpoints
  - name: film-projects
    description: Film editor projects
  - name: film-clips
    description: Clips within a film project
  - name: film-ai
    description: AI assistant for the film editor
paths:
  /auth/me:
    get:
      operationId: getCurrentAuthUser
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current auth user or null
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCurrentAuthUserResponse"

  /mobile-auth/token-exchange:
    post:
      operationId: exchangeMobileAuthorizationCode
      tags: [auth]
      summary: Exchange mobile auth code for session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExchangeMobileAuthorizationCodeBody"
      responses:
        "200":
          description: Session token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExchangeMobileAuthorizationCodeResponse"

  /mobile-auth/logout:
    post:
      operationId: logoutMobileSession
      tags: [auth]
      summary: Log out mobile session
      responses:
        "200":
          description: Logout result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutMobileSessionResponse"
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all projects
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a new project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectBody"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a project by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
    put:
      operationId: updateProject
      tags: [projects]
      summary: Update a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectBody"
      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /projects/{id}/pages:
    get:
      operationId: listPages
      tags: [pages]
      summary: List pages for a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of pages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Page"
    post:
      operationId: createPage
      tags: [pages]
      summary: Create a page for a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePageBody"
      responses:
        "201":
          description: Page created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Page"

  /projects/{id}/pages/{pageId}:
    put:
      operationId: updatePage
      tags: [pages]
      summary: Update a page
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: pageId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePageBody"
      responses:
        "200":
          description: Updated page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Page"
    delete:
      operationId: deletePage
      tags: [pages]
      summary: Delete a page
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: pageId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/recent-projects:
    get:
      operationId: getRecentProjects
      tags: [dashboard]
      summary: Get recently updated projects
      responses:
        "200":
          description: Recent projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"

  /showcase:
    get:
      operationId: listShowcaseApps
      tags: [showcase]
      summary: List all active showcase apps (featured first)
      responses:
        "200":
          description: Showcase apps
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShowcaseAppsResponse"

  /showcase/submit:
    post:
      operationId: submitShowcaseApp
      tags: [showcase]
      summary: Submit an app to the showcase
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShowcaseSubmission"
      responses:
        "201":
          description: Submission received
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShowcaseApp"

  /showcase/admin:
    get:
      operationId: listShowcaseAdmin
      tags: [showcase]
      summary: Admin — list all apps including pending
      responses:
        "200":
          description: All showcase apps
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ShowcaseApp"

  /showcase/{id}:
    patch:
      operationId: updateShowcaseApp
      tags: [showcase]
      summary: Admin — approve, feature, or deactivate an app
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShowcaseAppUpdate"
      responses:
        "200":
          description: Updated showcase app
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShowcaseApp"
    delete:
      operationId: deleteShowcaseApp
      tags: [showcase]
      summary: Admin — remove an app from the showcase
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /film/projects:
    get:
      operationId: listFilmProjects
      tags: [film-projects]
      summary: List all film projects
      responses:
        "200":
          description: List of film projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FilmProject"
    post:
      operationId: createFilmProject
      tags: [film-projects]
      summary: Create a new film project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FilmProjectInput"
      responses:
        "201":
          description: Film project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FilmProject"

  /film/projects/{id}:
    get:
      operationId: getFilmProject
      tags: [film-projects]
      summary: Get a film project by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Film project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FilmProject"
        "404":
          description: Not found
    patch:
      operationId: updateFilmProject
      tags: [film-projects]
      summary: Update a film project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FilmProjectUpdate"
      responses:
        "200":
          description: Updated film project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FilmProject"
    delete:
      operationId: deleteFilmProject
      tags: [film-projects]
      summary: Delete a film project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /film/projects/{id}/clips:
    get:
      operationId: listFilmClips
      tags: [film-clips]
      summary: List clips in a film project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of clips
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FilmClip"
    post:
      operationId: createFilmClip
      tags: [film-clips]
      summary: Add a clip to a film project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FilmClipInput"
      responses:
        "201":
          description: Clip created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FilmClip"

  /film/projects/{id}/clips/{clipId}:
    patch:
      operationId: updateFilmClip
      tags: [film-clips]
      summary: Update a clip
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: clipId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FilmClipUpdate"
      responses:
        "200":
          description: Updated clip
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FilmClip"
    delete:
      operationId: deleteFilmClip
      tags: [film-clips]
      summary: Delete a clip
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: clipId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /film/projects/{id}/clips/reorder:
    post:
      operationId: reorderFilmClips
      tags: [film-clips]
      summary: Reorder clips in a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FilmClipsReorder"
      responses:
        "200":
          description: Updated clip order
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FilmClip"

  /film/projects/{id}/stats:
    get:
      operationId: getFilmProjectStats
      tags: [film-projects]
      summary: Get project stats (duration, clip count, etc.)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FilmProjectStats"

  /film/recent:
    get:
      operationId: getRecentFilmProjects
      tags: [film-projects]
      summary: Get recently edited film projects
      responses:
        "200":
          description: Recent film projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FilmProject"

components:
  schemas:
    AuthUser:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          nullable: true
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        profileImageUrl:
          type: string
          nullable: true
      required:
        - id

    GetCurrentAuthUserResponse:
      type: object
      properties:
        user:
          oneOf:
            - $ref: "#/components/schemas/AuthUser"
            - type: "null"
      required:
        - user

    ExchangeMobileAuthorizationCodeBody:
      type: object
      properties:
        code:
          type: string
        code_verifier:
          type: string
        redirect_uri:
          type: string
        state:
          type: string
        nonce:
          type: string
          nullable: true
      required:
        - code
        - code_verifier
        - redirect_uri
        - state

    ExchangeMobileAuthorizationCodeResponse:
      type: object
      properties:
        token:
          type: string
      required:
        - token

    LogoutMobileSessionResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Project:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [draft, published, archived]
        template:
          type: string
        projectType:
          type: string
          enum: [website, app, api, tool]
        pageCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - status
        - template
        - projectType
        - pageCount
        - createdAt
        - updatedAt

    CreateProjectBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        template:
          type: string
        projectType:
          type: string
          enum: [website, app, api, tool]
      required:
        - name
        - template

    UpdateProjectBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [draft, published, archived]
        projectType:
          type: string
          enum: [website, app, api, tool]

    Page:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: integer
        title:
          type: string
        slug:
          type: string
        content:
          type: string
        order:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - projectId
        - title
        - slug
        - content
        - order
        - createdAt
        - updatedAt

    CreatePageBody:
      type: object
      properties:
        title:
          type: string
        slug:
          type: string
        content:
          type: string
        order:
          type: integer
      required:
        - title
        - slug

    UpdatePageBody:
      type: object
      properties:
        title:
          type: string
        slug:
          type: string
        content:
          type: string
        order:
          type: integer

    DashboardSummary:
      type: object
      properties:
        totalProjects:
          type: integer
        publishedProjects:
          type: integer
        draftProjects:
          type: integer
        totalPages:
          type: integer
      required:
        - totalProjects
        - publishedProjects
        - draftProjects
        - totalPages

    FilmProject:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        userId:
          type: string
        aspectRatio:
          type: string
          enum: ["16:9", "9:16", "1:1", "4:3", "21:9"]
        frameRate:
          type: integer
        status:
          type: string
          enum: [draft, in_progress, complete, exported]
        totalDurationMs:
          type: integer
        clipCount:
          type: integer
        thumbnailUrl:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - userId
        - aspectRatio
        - frameRate
        - status
        - totalDurationMs
        - clipCount
        - createdAt
        - updatedAt

    FilmProjectInput:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        aspectRatio:
          type: string
          enum: ["16:9", "9:16", "1:1", "4:3", "21:9"]
        frameRate:
          type: integer
      required:
        - title

    FilmProjectUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        aspectRatio:
          type: string
          enum: ["16:9", "9:16", "1:1", "4:3", "21:9"]
        frameRate:
          type: integer
        status:
          type: string
          enum: [draft, in_progress, complete, exported]
        thumbnailUrl:
          type: string

    FilmClip:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: integer
        name:
          type: string
        type:
          type: string
          enum: [video, audio, image, text, transition, color]
        sourceUrl:
          type: ["string", "null"]
        thumbnailUrl:
          type: ["string", "null"]
        startMs:
          type: integer
        durationMs:
          type: integer
        trackIndex:
          type: integer
        order:
          type: integer
        trimStartMs:
          type: integer
        trimEndMs:
          type: integer
        volume:
          type: number
        opacity:
          type: number
        speed:
          type: number
        metadata:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - projectId
        - name
        - type
        - startMs
        - durationMs
        - trackIndex
        - order
        - trimStartMs
        - trimEndMs
        - volume
        - opacity
        - speed
        - createdAt
        - updatedAt

    FilmClipInput:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          enum: [video, audio, image, text, transition, color]
        sourceUrl:
          type: string
        thumbnailUrl:
          type: string
        startMs:
          type: integer
        durationMs:
          type: integer
        trackIndex:
          type: integer
        order:
          type: integer
        trimStartMs:
          type: integer
        trimEndMs:
          type: integer
        volume:
          type: number
        opacity:
          type: number
        speed:
          type: number
        metadata:
          type: string
      required:
        - name
        - type
        - durationMs

    FilmClipUpdate:
      type: object
      properties:
        name:
          type: string
        sourceUrl:
          type: string
        thumbnailUrl:
          type: string
        startMs:
          type: integer
        durationMs:
          type: integer
        trackIndex:
          type: integer
        order:
          type: integer
        trimStartMs:
          type: integer
        trimEndMs:
          type: integer
        volume:
          type: number
        opacity:
          type: number
        speed:
          type: number
        metadata:
          type: string

    FilmClipsReorder:
      type: object
      properties:
        clipIds:
          type: array
          items:
            type: integer
      required:
        - clipIds

    FilmProjectStats:
      type: object
      properties:
        totalDurationMs:
          type: integer
        clipCount:
          type: integer
        videoClips:
          type: integer
        audioClips:
          type: integer
        imageClips:
          type: integer
        textClips:
          type: integer
        trackCount:
          type: integer
      required:
        - totalDurationMs
        - clipCount
        - videoClips
        - audioClips
        - imageClips
        - textClips
        - trackCount

    ShowcaseApp:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        tagline:
          type: string
        description:
          type: string
        websiteUrl:
          type: ["string", "null"]
        iosUrl:
          type: ["string", "null"]
        androidUrl:
          type: ["string", "null"]
        logoUrl:
          type: ["string", "null"]
        screenshotUrl:
          type: ["string", "null"]
        category:
          type: string
          enum: [productivity, social, media, education, tools, games, finance, health, creative, other]
        listingType:
          type: string
          enum: [advertise, hosted]
        isFeatured:
          type: boolean
        isActive:
          type: boolean
        isPlaceholder:
          type: boolean
        submittedBy:
          type: ["string", "null"]
        builderName:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - tagline
        - description
        - category
        - listingType
        - isFeatured
        - isActive
        - isPlaceholder
        - createdAt
        - updatedAt

    ShowcaseAppsResponse:
      type: object
      properties:
        featured:
          type: array
          items:
            $ref: "#/components/schemas/ShowcaseApp"
        community:
          type: array
          items:
            $ref: "#/components/schemas/ShowcaseApp"
      required:
        - featured
        - community

    ShowcaseSubmission:
      type: object
      properties:
        name:
          type: string
        tagline:
          type: string
        description:
          type: string
        websiteUrl:
          type: string
        iosUrl:
          type: string
        androidUrl:
          type: string
        logoUrl:
          type: string
        screenshotUrl:
          type: string
        category:
          type: string
          enum: [productivity, social, media, education, tools, games, finance, health, creative, other]
        listingType:
          type: string
          enum: [advertise, hosted]
        builderName:
          type: string
      required:
        - name
        - tagline
        - description

    ShowcaseAppUpdate:
      type: object
      properties:
        name:
          type: string
        tagline:
          type: string
        description:
          type: string
        websiteUrl:
          type: string
        iosUrl:
          type: string
        androidUrl:
          type: string
        logoUrl:
          type: string
        screenshotUrl:
          type: string
        category:
          type: string
          enum: [productivity, social, media, education, tools, games, finance, health, creative, other]
        listingType:
          type: string
          enum: [advertise, hosted]
        isFeatured:
          type: boolean
        isActive:
          type: boolean
        isPlaceholder:
          type: boolean
        builderName:
          type: string
